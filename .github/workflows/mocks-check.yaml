# Fails if interfaces were changed but mocks were not regenerated.
# Run "make mocks-generate" locally and commit the changes.
name: Mocks up to date

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  mocks-check:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get go version from go.mod
        run: |
          echo "GO_VERSION=$(grep '^go ' go.mod | cut -d " " -f 2)" >> $GITHUB_ENV

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate mocks
        run: make mocks-generate

      - name: Check mocks are up to date
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated mocks differ from committed files. You changed an interface but did not run 'make mocks-generate'. Run it locally and commit the changes."
            exit 1
          fi
