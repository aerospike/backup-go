name: Tests
on:
  push:
    branches:
      - '**'
  workflow_call:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      # Aerospike service container
      aerospike:
        image: aerospike/aerospike-server-enterprise:8.0.0.3
        ports:
          - 3000:3000
          - 3001:3001
          - 3002:3002

      # Minio service container - using prebuilt image
      minio:
        image: bitnami/minio:latest  # Using Bitnami image which has simpler defaults
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadminpassword
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --name minio
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      # Fake GCS server - simplified
      fake-gcs-server:
        image: fsouza/fake-gcs-server:latest
        ports:
          - 4443:4443

      # Azurite - simplified
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - 5000:10000

    steps:
      - uses: actions/checkout@v4

      - name: Get go version from go.mod
        run: |
          echo "GO_VERSION=$(grep '^go ' go.mod | cut -d " " -f 2)" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Set up containers that need special configuration
      - name: Set up Fake GCS Server
        run: |
          # Configure fake-gcs-server if needed
          curl -X POST http://localhost:4443/storage/v1/b \
            -H "Content-Type: application/json" \
            -d '{"name":"backup"}'
          curl -X POST http://localhost:4443/storage/v1/b \
            -H "Content-Type: application/json" \
            -d '{"name":"asbackup"}'

      - name: Configure Minio
        run: |
          # Install Minio client
          wget https://dl.min.io/client/mc/release/linux-amd64/mc -O /tmp/mc
          chmod +x /tmp/mc
          
          # Configure buckets and permissions
          /tmp/mc alias set myminio http://localhost:9000 minioadmin minioadminpassword
          /tmp/mc mb myminio/backup --ignore-existing || true
          /tmp/mc mb myminio/asbackup --ignore-existing || true
          /tmp/mc anonymous set upload myminio/backup
          /tmp/mc anonymous set download myminio/backup
          /tmp/mc anonymous set public myminio/backup
          /tmp/mc anonymous set upload myminio/asbackup
          /tmp/mc anonymous set download myminio/asbackup
          /tmp/mc anonymous set public myminio/asbackup

      - name: Run tests with coverage
        run: |
          # Set environment variables to connect to service containers
          export AEROSPIKE_HOST=localhost
          export MINIO_ENDPOINT=http://localhost:9000
          export GCS_ENDPOINT=http://localhost:4443
          export AZURE_ENDPOINT=http://localhost:5000
          
          # Run tests with parallelism
          go test -race -timeout=5m -count=1 -parallel $(nproc) -coverprofile=coverage.cov -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: coverage.cov
          verbose: false